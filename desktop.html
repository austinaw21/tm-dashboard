<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TM Dashboard — Desktop</title>
<style>
:root{
  --bg:#0a0e17;--sf:#111827;--sf2:#1a2235;--bd:#1e293b;
  --tx:#e2e8f0;--dim:#94a3b8;--mt:#64748b;
  --grn:#22c55e;--grn2:rgba(34,197,94,.12);--grnB:rgba(34,197,94,.3);
  --amb:#f59e0b;--amb2:rgba(245,158,11,.12);--ambB:rgba(245,158,11,.3);
  --red:#ef4444;--red2:rgba(239,68,68,.12);--redB:rgba(239,68,68,.3);
  --blu:#3b82f6;--blu2:rgba(59,130,246,.1);--bluB:rgba(59,130,246,.3);
  --cyn:#06b6d4;--cyn2:rgba(6,182,212,.12);--cynB:rgba(6,182,212,.3);
  --r:8px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:'SF Mono','Fira Code','JetBrains Mono','Courier New',monospace;
  max-width:1200px;margin:0 auto;min-height:100vh;font-size:12px;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}

/* Top strip */
.strip{position:sticky;top:0;z-index:20;background:var(--bg);border-bottom:1px solid var(--bd);padding:8px 20px;
  display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.strip-title{font-size:14px;font-weight:700;letter-spacing:.5px}
.strip-title .a{color:var(--blu)}
.strip-dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-left:4px}
.strip-metrics{display:flex;gap:14px;font-size:11px;flex:1}
.strip-metrics .lbl{color:var(--mt);margin-right:3px}
.strip-metrics .val{font-weight:700}
.strip-right{display:flex;gap:10px;align-items:center}
.pill{display:inline-block;font-size:9px;font-weight:700;padding:3px 8px;border-radius:10px;letter-spacing:.4px}
.session-badge{font-size:9px;font-weight:700;padding:3px 8px;border-radius:10px;background:var(--cyn2);color:var(--cyn);letter-spacing:.3px}
.btn-sm{background:var(--sf2);border:1px solid var(--bd);color:var(--dim);font:inherit;font-size:10px;
  padding:4px 10px;border-radius:5px;cursor:pointer}
.btn-sm:hover{border-color:var(--mt)}

/* Tabs */
.tabs{position:sticky;top:42px;z-index:15;background:var(--bg);display:flex;border-bottom:1px solid var(--bd);padding:0 20px}
.tab{padding:8px 16px;text-align:center;font-size:11px;font-weight:600;letter-spacing:.5px;
  color:var(--mt);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab.on{color:var(--blu);border-bottom-color:var(--blu)}
.tab.placeholder{color:var(--bd);cursor:default}

/* Content */
.pane{display:none;padding:16px 20px 60px}
.pane.on{display:block}

/* Cards */
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px 16px;margin-bottom:12px}
.card-t{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--mt);margin-bottom:10px}

/* Grid layouts */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

/* Metrics */
.mg{display:grid;gap:6px;margin-bottom:8px}
.mg2{grid-template-columns:repeat(2,1fr)}.mg3{grid-template-columns:repeat(3,1fr)}
.mg4{grid-template-columns:repeat(4,1fr)}.mg5{grid-template-columns:repeat(5,1fr)}
.mg6{grid-template-columns:repeat(6,1fr)}
.m{background:var(--sf2);border-radius:6px;padding:8px 10px}
.m-l{font-size:9px;color:var(--dim);margin-bottom:2px}
.m-v{font-size:16px;font-weight:600}

/* Action bar */
.action-bar{border-radius:var(--r);padding:12px 16px;margin-bottom:12px;font-size:12px;line-height:1.5}
.action-bar .label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.action-bar .msg{font-weight:500}
.action-bar .blockers{font-size:11px;color:var(--dim);margin-top:4px}

/* Regime */
.regime{border-radius:var(--r);padding:10px 14px;margin-bottom:12px;text-align:center;font-weight:700;font-size:14px;letter-spacing:1px}

/* Tables */
table{width:100%;border-collapse:collapse;font-size:11px}
th{text-align:left;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--mt);
  padding:6px 8px;border-bottom:1px solid var(--bd)}
td{padding:6px 8px;border-bottom:1px solid var(--bd)}
tr:hover{background:var(--sf2)}
.tar{text-align:right}

/* Row */
.row{display:flex;justify-content:space-between;align-items:center;padding:6px 0}
.row+.row{border-top:1px solid var(--bd)}
.row-l{font-size:10px;color:var(--dim)}
.row-v{font-size:11px;font-weight:600}

/* Pair cards */
.pcard{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:12px 14px}
.pcard-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.pcard-name{font-size:13px;font-weight:700}

/* Badge */
.badge{display:flex;gap:4px;flex-wrap:wrap;margin:4px 0}
.bdg{font-size:8px;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:.3px}

/* Condition badge */
.cond{font-size:9px;font-weight:700;padding:3px 8px;border-radius:10px;letter-spacing:.3px}

/* Progress bar */
.pbar{height:6px;background:var(--sf2);border-radius:3px;overflow:hidden;margin:4px 0}
.pbar-fill{height:100%;border-radius:3px;transition:width .5s}

/* Percentile bar */
.pctl-bar{position:relative;height:10px;background:linear-gradient(90deg,var(--red2),var(--sf2) 30%,var(--sf2) 70%,var(--red2));border-radius:5px;margin:4px 0}
.pctl-dot{position:absolute;top:0;width:10px;height:10px;border-radius:50%;background:var(--tx);border:2px solid var(--blu);transform:translateX(-50%)}

/* Gauge (for indicators) */
.gauge{display:flex;align-items:center;gap:8px;margin:4px 0}
.gauge-bar{flex:1;height:8px;background:var(--sf2);border-radius:4px;overflow:hidden;position:relative}
.gauge-fill{height:100%;border-radius:4px;transition:width .3s}
.gauge-label{font-size:10px;color:var(--dim);width:60px}
.gauge-val{font-size:11px;font-weight:600;width:50px;text-align:right}

/* Chart */
.chart-wrap{background:var(--sf2);border-radius:6px;padding:10px;margin:6px 0}
svg text{font-family:inherit}

/* Alert */
.alert{border-radius:6px;padding:8px 12px;margin-bottom:8px;font-size:11px;display:flex;gap:8px;align-items:flex-start}
.alert-icon{font-size:14px;flex-shrink:0;line-height:1}

/* Collapsible */
.coll-btn{background:none;border:none;color:var(--dim);font:inherit;font-size:10px;
  padding:4px 8px;cursor:pointer}
.coll-body{display:none}
.coll-body.open{display:block}

/* Filters */
.filters{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
select,input[type="date"]{background:var(--sf2);border:1px solid var(--bd);color:var(--tx);font:inherit;font-size:11px;
  padding:4px 8px;border-radius:5px}
select:focus,input:focus{outline:none;border-color:var(--blu)}

/* Connect */
.connect{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:80vh;padding:40px;text-align:center}
.connect h2{font-size:18px;margin-bottom:8px}
.connect p{font-size:11px;color:var(--dim);margin-bottom:20px}
.connect input{width:400px;max-width:90vw;background:var(--sf);border:1px solid var(--bd);border-radius:6px;
  color:var(--tx);font:inherit;font-size:12px;padding:10px;margin-bottom:10px}
.connect input:focus{outline:none;border-color:var(--blu)}
.connect button{background:var(--blu);color:#fff;border:none;border-radius:6px;
  font:inherit;font-weight:700;font-size:12px;padding:10px 30px;cursor:pointer}

/* Lab placeholder */
.lab-placeholder{text-align:center;padding:60px 20px;color:var(--mt)}
.lab-placeholder h3{font-size:16px;margin-bottom:12px;color:var(--dim)}
.lab-placeholder p{font-size:11px;line-height:1.6;max-width:500px;margin:0 auto 8px}

/* Utility */
.neg{color:var(--red)}.pos{color:var(--grn)}.warn{color:var(--amb)}
.dim{color:var(--dim)}.mt4{margin-top:4px}.mt8{margin-top:8px}.mb4{margin-bottom:4px}.mb8{margin-bottom:8px}
.tac{text-align:center}
.fx{display:flex}.fxb{display:flex;justify-content:space-between;align-items:center}
.gap4{gap:4px}.gap8{gap:8px}.gap12{gap:12px}
.f1{flex:1}
.hidden{display:none}
</style>
</head>
<body>

<div id="app">
  <div class="connect" id="connectScreen">
    <h2>TM Dashboard — Desktop</h2>
    <p>Paste your Google Apps Script URL to connect</p>
    <input id="urlInput" placeholder="https://script.google.com/macros/s/.../exec" spellcheck="false">
    <button onclick="saveUrl()">Connect</button>
    <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--bd);width:400px;max-width:90vw">
      <p style="font-size:10px;color:var(--mt);margin-bottom:8px">Or preview with sample data</p>
      <button onclick="loadDemo()" style="background:var(--sf2);border:1px solid var(--bd);color:var(--dim);border-radius:6px;font:inherit;font-weight:700;font-size:12px;padding:10px 30px;cursor:pointer">Demo Mode</button>
    </div>
  </div>

  <div id="dashboard" class="hidden">
    <div class="strip" id="strip"></div>
    <div class="tabs" id="tabBar">
      <div class="tab on" data-t="overview">OVERVIEW</div>
      <div class="tab" data-t="pairs">PAIRS</div>
      <div class="tab" data-t="market">MARKET</div>
      <div class="tab" data-t="strategy">STRATEGY</div>
      <div class="tab" data-t="history">HISTORY</div>
      <div class="tab placeholder" data-t="lab">LAB</div>
    </div>
    <div class="pane on" id="p-overview"></div>
    <div class="pane" id="p-pairs"></div>
    <div class="pane" id="p-market"></div>
    <div class="pane" id="p-strategy"></div>
    <div class="pane" id="p-history"></div>
    <div class="pane" id="p-lab"></div>
  </div>
</div>

<script>
// ============================================================
// State
// ============================================================
const S = {
  url: localStorage.getItem('tm_url') || '',
  data: null,
  indicators: null,
  err: null,
  loading: false,
  tab: 'overview',
  refreshMs: 180000,
  timer: null,
  pairFilter: 'all',
  withdrawals: JSON.parse(localStorage.getItem('tm_wd') || '[]'),
};

if (S.url) { showDashboard(); fetchData(); }
else { document.getElementById('connectScreen').classList.remove('hidden'); loadDemo(); }

function saveUrl() {
  const v = document.getElementById('urlInput').value.trim();
  if (v.length < 10) return;
  S.url = v; localStorage.setItem('tm_url', v);
  showDashboard(); fetchData();
}

function showDashboard() {
  document.getElementById('connectScreen').classList.add('hidden');
  document.getElementById('dashboard').classList.remove('hidden');
  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      if (t.classList.contains('placeholder')) return;
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('on'));
      document.querySelectorAll('.pane').forEach(x => x.classList.remove('on'));
      t.classList.add('on'); S.tab = t.dataset.t;
      document.getElementById('p-' + S.tab).classList.add('on');
    });
  });
}

// ============================================================
// Data fetching
// ============================================================
async function fetchData() {
  S.loading = true; renderStrip();
  try {
    const [mainR, indR] = await Promise.all([
      fetch(S.url + '?action=all'),
      fetch(S.url + '?action=indicators&hours=168')
    ]);
    const mainText = await mainR.text();
    if (mainText.trim().charAt(0) !== '{') { S.err = 'Not JSON — check URL'; }
    else { const d = JSON.parse(mainText); if (d.status === 'ok') { S.data = d; S.err = null; } else S.err = d.msg || 'Error'; }
    try { const it = await indR.text(); const id = JSON.parse(it); if (id.status === 'ok') S.indicators = id.indicators || []; }
    catch(e) { S.indicators = []; }
  } catch(e) { S.err = e.message; }
  S.loading = false; render();
  clearTimeout(S.timer); S.timer = setTimeout(fetchData, S.refreshMs);
}

// ============================================================
// Regime — Option B full integration (same logic as phone)
// ============================================================
function calcRegime() {
  if (!S.data || !S.data.latest) return { r:'OFFLINE', c:'var(--mt)', reasons:[], primeBlockers:[] };
  const L = S.data.latest, D = S.data.daily || [];
  if (L.tm && L.tm.def) return { r:'DEFENSIVE', c:'var(--red)', reasons:['TM defensive mode active'], primeBlockers:[] };

  const cautionR = [], primeBlock = [];

  if (L.acct && L.tm && L.acct.dd >= L.tm.ddSoft)
    cautionR.push('DD ' + L.acct.dd.toFixed(1) + '% ≥ ' + L.tm.ddSoft + '%');

  if (L.pairs) for (const p of L.pairs) {
    const grid = Math.max(p.buyN||0, p.sellN||0);
    const adxPct = p.adxR > 0 ? p.adx / p.adxR : 0;
    const maxDepth = Math.max(p.buyDepth||0, p.sellDepth||0);
    const maxVel = Math.max(p.buyVel||0, p.sellVel||0);
    const maxAge = Math.max(p.oldBuyAge||0, p.oldSellAge||0);
    const prcPct = p.prcPct || 50;
    const rsi = p.rsi || 50;
    const h1Bull = (p.diP||0) > (p.diM||0);
    const domSide = (p.buyN||0) >= (p.sellN||0) ? 'buy' : 'sell';

    // CAUTION triggers
    if (adxPct >= 0.8 && p.brk) cautionR.push(p.n + ' ADX ' + p.adx.toFixed(0) + ' (' + (adxPct*100).toFixed(0) + '%)');
    if (grid >= 6) cautionR.push(p.n + ' grid ' + grid + ' trades');
    if (p.atrR >= 1.3) cautionR.push(p.n + ' ATR ' + p.atrR.toFixed(1) + 'x');
    if (p.fb) cautionR.push(p.n + ' float breaker');
    if (maxDepth >= 50) cautionR.push(p.n + ' grid ' + maxDepth.toFixed(0) + 'p deep');
    if (maxVel >= 3) cautionR.push(p.n + ' velocity ' + maxVel + '/hr');
    if (maxAge >= 1440) cautionR.push(p.n + ' stuck ' + Math.floor(maxAge/60) + 'h');
    if ((p.adxH4||0) >= 25 && adxPct < 0.8) {
      const h4Bull = (p.diPH4||0) > (p.diMH4||0);
      if ((domSide === 'buy' && !h4Bull) || (domSide === 'sell' && h4Bull))
        cautionR.push(p.n + ' H4 against ' + domSide);
    }

    // PRIME blockers
    if (adxPct >= 0.7) primeBlock.push(p.n + ' ADX ' + (adxPct*100).toFixed(0) + '%');
    if (p.atrR >= 1.1) primeBlock.push(p.n + ' ATR ' + p.atrR.toFixed(1) + 'x');
    if (grid > 4) primeBlock.push(p.n + ' grid ' + grid);
    if (maxDepth > 20) primeBlock.push(p.n + ' depth ' + maxDepth.toFixed(0) + 'p');
    if (maxAge > 360) primeBlock.push(p.n + ' trade open ' + Math.floor(maxAge/60) + 'h');
    if ((p.buyN||0) > 0 && prcPct > 80) primeBlock.push(p.n + ' buys@' + prcPct.toFixed(0) + 'pctl');
    if ((p.sellN||0) > 0 && prcPct < 20) primeBlock.push(p.n + ' sells@' + prcPct.toFixed(0) + 'pctl');
    if ((p.adxSlp||0) > 0 && grid > 0 && ((domSide==='buy'&&!h1Bull)||(domSide==='sell'&&h1Bull)))
      primeBlock.push(p.n + ' ADX rising vs grid');
    if ((p.buyN||0) > (p.sellN||0) && rsi > 72) primeBlock.push(p.n + ' RSI ' + rsi.toFixed(0));
    if ((p.sellN||0) > (p.buyN||0) && rsi < 28) primeBlock.push(p.n + ' RSI ' + rsi.toFixed(0));
  }

  if (L.eurCorr) cautionR.push('EUR pairs correlated');
  const streak = calcLossStreak(D);
  if (streak >= 4) cautionR.push(streak + '-day loss streak');

  if (cautionR.length > 0) return { r:'CAUTION', c:'var(--amb)', reasons:cautionR, primeBlockers:primeBlock };

  const pnl7d = calc7dPnl(D);
  if (pnl7d <= 0) primeBlock.push('7d P&L $' + pnl7d.toFixed(2));
  const rf = calcRF(D);
  if (rf < 1.5 && rf >= 0) primeBlock.push('RF ' + rf.toFixed(1));
  if (L.acct) { const c = L.acct.eq - L.acct.floor, dd = calc7dMaxDD(); if (c > 0 && dd > c * 0.4) primeBlock.push('7d DD > 40% cushion'); }
  if (L.eurCorr) primeBlock.push('EUR correlated');

  if (primeBlock.length === 0) return { r:'PRIME', c:'var(--grn)', reasons:[], primeBlockers:[] };
  return { r:'NORMAL', c:'var(--blu)', reasons:[], primeBlockers:primeBlock };
}

// ============================================================
// Helpers (same as phone)
// ============================================================
function calcLossStreak(D) { if(!D||!D.length) return 0; const bd={}; for(const d of D) bd[d.date]=(bd[d.date]||0)+(d.pnl||0); let s=0; for(const dt of Object.keys(bd).sort().reverse()){if(bd[dt]<0)s++;else break;} return s; }
function calc7dPnl(D) { if(!D) return 0; const c=new Date();c.setDate(c.getDate()-7); const cs=c.toISOString().substring(0,10).replace(/-/g,'.'); return D.filter(d=>d.date>=cs).reduce((s,d)=>s+(d.pnl||0),0); }
function calcRF(D) { if(!D||!D.length) return 0; const bd={}; for(const d of D) bd[d.date]=(bd[d.date]||0)+(d.pnl||0); let cum=0,pk=0,mdd=0; for(const dt of Object.keys(bd).sort()){cum+=bd[dt];if(cum>pk)pk=cum;const dd=pk-cum;if(dd>mdd)mdd=dd;} return mdd<=0?(cum>0?99:0):cum/mdd; }
function calc7dMaxDD() { if(!S.data||!S.data.snapshots) return 0; let mx=0; for(const s of S.data.snapshots) if(s.dd>mx)mx=s.dd; return (S.data.latest?S.data.latest.acct.bal:0)*mx/100; }
function calcLots() {
  if(!S.data||!S.data.latest) return null;
  const L=S.data.latest,reg=calcRegime(),pairs=L.pairs?L.pairs.length:1;
  const cushion=L.acct.eq-L.acct.floor,pp=pairs>0?cushion/pairs:cushion;
  const hm=Math.max(0.01,Math.floor(pp/100)*0.01),tm2=Math.max(0.01,Math.floor(pp/150)*0.01);
  let rec; switch(reg.r){case'PRIME':rec=tm2;break;case'NORMAL':rec=Math.min(hm,L.acct.baseLots||0.01);break;case'CAUTION':rec=L.acct.baseLots||0.01;break;default:rec=0.01;}
  rec=Math.max(0.01,rec);
  const pct=hm>0.01?Math.min(100,((rec-0.01)/(hm-0.01))*100):0;
  return {rec,hardMax:hm,tierMax:tm2,cushion,perPair:pp,pct,regime:reg};
}
function calcExpectancy(daily, pairName) {
  const rows = pairName ? daily.filter(d => d.pair === pairName) : daily;
  let gW=0,gL=0,tW=0,tL=0;
  for(const d of rows){gW+=d.grossWin||0;gL+=d.grossLoss||0;tW+=d.wins||0;tL+=d.losses||0;}
  const tot=tW+tL; if(tot===0) return null;
  const wr=tW/tot, aW=tW>0?gW/tW:0, aL=tL>0?gL/tL:0;
  const exp=(wr*aW)-((1-wr)*aL), pf=gL>0?gW/gL:(gW>0?99:0);
  return {exp,pf,winRate:wr,avgWin:aW,avgLoss:aL,totalWins:tW,totalLosses:tL};
}
function pairCondition(p) {
  let score=0;const reasons=[];
  const adxPct=p.adxR>0?p.adx/p.adxR:0;
  if(adxPct<0.5){score+=1;reasons.push('Low ADX');}else if(adxPct>=0.8){score-=2;reasons.push('High ADX');}else if(adxPct>=0.7){score-=1;}
  const bbw=p.bbw||0; if(bbw>0&&bbw<0.005){score+=1;reasons.push('Tight BBW');}else if(bbw>0.015){score-=1;reasons.push('Wide BBW');}
  const maxDepth=Math.max(p.buyDepth||0,p.sellDepth||0);
  if(maxDepth>50){score-=2;reasons.push('Deep grid');}else if(maxDepth>20){score-=1;}else if(maxDepth===0){score+=1;}
  const rngPct=p.rngPct||50; if(rngPct>80){score+=1;reasons.push('Range spent');}
  const maxVel=Math.max(p.buyVel||0,p.sellVel||0); if(maxVel>=3){score-=2;reasons.push('Rapid stacking');}
  if(p.atrR>=1.3){score-=1;reasons.push('High ATR');}else if(p.atrR<0.8){score+=1;reasons.push('Calm');}
  let label,col;
  if(score>=2){label='FAVORABLE';col='var(--grn)';}else if(score<=-2){label='UNFAVORABLE';col='var(--red)';}else{label='NEUTRAL';col='var(--dim)';}
  return {label,col,reasons,score};
}

// ============================================================
// Render
// ============================================================
function render() { renderStrip(); renderOverview(); renderPairs(); renderMarket(); renderStrategy(); renderHistory(); renderLab(); }

// ============================================================
// Strip (always visible)
// ============================================================
function renderStrip() {
  const el = document.getElementById('strip');
  if (!S.data || !S.data.latest) {
    el.innerHTML = `<span class="strip-title"><span class="a">TM</span> Dashboard</span>
      <span class="dim" style="font-size:11px">${S.loading ? 'Loading...' : (S.err || 'Waiting for data')}</span>`;
    return;
  }
  const L = S.data.latest, a = L.acct, reg = calcRegime(), session = L.session || '';
  el.innerHTML = `<span class="strip-title"><span class="a">TM</span> Dashboard<span class="strip-dot" style="background:${reg.c}"></span></span>
    <div class="strip-metrics">

  </div>`;

  el.innerHTML = h;

function buildActionBar(reg, lots) {
  let msg='', blockerStr='';
  switch(reg.r) {
    case 'PRIME': msg='All gates clear. Conditions prime for scaling.'; if(lots) msg+=' Lot: '+lots.rec.toFixed(2); break;
    case 'NORMAL': msg='Operating normally. Not yet clear for scaling.';
      if(reg.primeBlockers&&reg.primeBlockers.length>0) blockerStr='Blocking PRIME: '+reg.primeBlockers.slice(0,4).join(' · ');
      break;
    case 'CAUTION': msg='Elevated risk detected.';
      if(reg.reasons&&reg.reasons.length>0) blockerStr=reg.reasons.slice(0,4).join(' · ');
      break;
    case 'DEFENSIVE': msg='Defensive mode — protecting capital. Lot locked at 0.01.'; break;
    default: msg='System offline.';
  }
  return `<div class="action-bar" style="background:${reg.c}18;border:1px solid ${reg.c}33">
    <div class="label" style="color:${reg.c}">${reg.r}</div>
    <div class="msg">${msg}</div>
    ${blockerStr?'<div class="blockers">'+blockerStr+'</div>':''}
  </div>`;
}

function buildGateList(L, D) {
  const gates = [];
  const pnl7d = calc7dPnl(D), rf = calcRF(D), streak = calcLossStreak(D);
  gates.push({ name:'7d Net P&L', val:'$'+pnl7d.toFixed(2), pass:pnl7d>0 });
  gates.push({ name:'Recovery Factor', val:rf>=99?'∞':rf.toFixed(1), pass:rf>=1.5 });
  gates.push({ name:'Loss Streak', val:streak+'d', pass:streak<4 });
  if(L.eurCorr!==undefined) gates.push({ name:'EUR Correlation', val:L.eurCorr?'YES':'No', pass:!L.eurCorr });

  if (L.pairs) for (const p of L.pairs) {
    const adxPct = p.adxR>0?(p.adx/p.adxR*100):0;
    const grid = Math.max(p.buyN||0,p.sellN||0);
    const maxDepth = Math.max(p.buyDepth||0,p.sellDepth||0);
    const maxAge = Math.max(p.oldBuyAge||0,p.oldSellAge||0);
    gates.push({ name:p.n+' ADX', val:adxPct.toFixed(0)+'%', pass:adxPct<70 });
    gates.push({ name:p.n+' ATR', val:p.atrR.toFixed(2)+'x', pass:p.atrR<1.1 });
    gates.push({ name:p.n+' Grid Count', val:grid.toString(), pass:grid<=4 });
    gates.push({ name:p.n+' Grid Depth', val:maxDepth>0?maxDepth.toFixed(0)+'p':'0p', pass:maxDepth<=20 });
    gates.push({ name:p.n+' Trade Age', val:maxAge>0?Math.floor(maxAge/60)+'h':'0h', pass:maxAge<=360 });
  }
  return gates;
}

function renderPairs() {

    const adxCol = adxPct>=0.8?'var(--red)':adxPct>=0.7?'var(--amb)':'var(--grn)';
    const maxDepth = Math.max(p.buyDepth||0,p.sellDepth||0);
    const maxAge = Math.max(p.oldBuyAge||0,p.oldSellAge||0);
    const prcPct = p.prcPct||50;

    const swap = p.swap||0;

    h += `<div class="pcard">
      <div class="pcard-hdr"><span class="pcard-name">${p.n}</span>
        <span class="cond" style="background:${cond.col}22;color:${cond.col}">${cond.label}</span></div>`;

    h += `<div class="badge">
      <span class="bdg" style="background:${adxCol}22;color:${adxCol}">ADX ${p.adx.toFixed(0)}/${p.adxR}</span>

      <span class="bdg" style="background:var(--sf2);color:${p.emaBull?'var(--grn)':'var(--red)'}">${p.emaBull?'▲ BULL':'▼ BEAR'}</span>
      <span class="bdg" style="background:var(--sf2);color:var(--dim)">ATR ${p.atrR.toFixed(2)}x</span>
      ${swap<-0.01?'<span class="bdg" style="background:var(--amb2);color:var(--amb)">SWAP $'+swap.toFixed(2)+'</span>':''}
    </div>`;

    h += `<div class="mg mg3 mt4">
      <div class="m"><div class="m-l">Float</div><div class="m-v ${(p.floatPnl||0)>=0?'pos':'neg'}">$${(p.floatPnl||0).toFixed(2)}</div></div>
      <div class="m"><div class="m-l">Today</div><div class="m-v ${todayPnl>=0?'pos':'neg'}">$${todayPnl.toFixed(2)}</div></div>
      <div class="m"><div class="m-l">Total</div><div class="m-v ${totalPnl>=0?'pos':'neg'}">$${totalPnl.toFixed(2)}</div></div>
    </div>`;

    h += `<div class="mg mg4 mt4">
      <div class="m"><div class="m-l">Depth</div><div class="m-v ${maxDepth>50?'neg':maxDepth>20?'warn':''}">${maxDepth>0?maxDepth.toFixed(0)+'p':'—'}</div></div>
      <div class="m"><div class="m-l">RSI</div><div class="m-v ${rsi>70||rsi<30?'warn':''}">${rsi.toFixed(0)}</div></div>
      <div class="m"><div class="m-l">$/day</div><div class="m-v ${dailyRate>=0?'pos':'neg'}">${dailyRate.toFixed(2)}</div></div>
      <div class="m"><div class="m-l">Grid</div><div class="m-v">${p.buyN||0}B/${p.sellN||0}S</div></div>
    </div>`;

    // Price percentile
    h += `<div style="margin:6px 0"><div class="fxb" style="font-size:8px;color:var(--dim)"><span>Low</span><span>Price in 20d Range</span><span>High</span></div>
      <div class="pctl-bar"><div class="pctl-dot" style="left:${prcPct}%"></div></div></div>`;

    // Expectancy
    if (exp) {
      h += `<div class="fxb mt4" style="font-size:9px">
        <span class="dim">Exp: <span class="${exp.exp>=0?'pos':'neg'}" style="font-weight:600">$${exp.exp.toFixed(3)}</span></span>
        <span class="dim">PF: <span style="font-weight:600">${exp.pf>=99?'∞':exp.pf.toFixed(2)}</span></span>
        <span class="dim">WR: ${(exp.winRate*100).toFixed(0)}%</span>
      </div>`;
    }

    if (maxAge > 360) h += `<div class="dim mt4" style="font-size:9px">⏱ Oldest trade: ${Math.floor(maxAge/60)}h</div>`;
    h += `<div class="dim mt4" style="font-size:9px">${daysActive}d active · Range ${(p.rngPct||0).toFixed(0)}% consumed</div>`;
    h += '</div>';
  }
  h += '</div>';
  el.innerHTML = h;
}

      <div class="m"><div class="m-l">Allowed</div><div class="m-v pos">${tm.dayA||0}</div></div>
      <div class="m"><div class="m-l">Blocked</div><div class="m-v neg">${tm.dayB||0}</div></div>
      <div class="m"><div class="m-l">Cooldown</div><div class="m-v warn">${tm.dayC||0}</div></div>
      <div class="m"><div class="m-l">Float Blk</div><div class="m-v">${tm.dayF||0}</div></div>
    </div>
    <div class="row"><span class="row-l">DD Soft Limit</span><span class="row-v">${tm.ddSoft||15}%</span></div>
    <div class="row"><span class="row-l">Max Trades</span><span class="row-v">${tm.maxT||50}</span></div>
    <div class="row"><span class="row-l">Equity Floor</span><span class="row-v">$${L.acct.floor.toFixed(0)}</span></div>
  </div>`;

  // Strategy metrics — REAL expectancy
  const allExp = calcExpectancy(D);
  const totalPnl = D.reduce((s,d)=>s+(d.pnl||0),0);
  const totalDays = new Set(D.map(d=>d.date)).size;
  const pnl7d = calc7dPnl(D);
  const rfVal = calcRF(D);
  const streak = calcLossStreak(D);

  h += `<div class="card"><div class="card-t">Strategy Metrics</div>
    <div class="mg mg3">
      <div class="m"><div class="m-l">Total P&L</div><div class="m-v ${totalPnl>=0?'pos':'neg'}">$${totalPnl.toFixed(2)}</div></div>
      <div class="m"><div class="m-l">7d P&L</div><div class="m-v ${pnl7d>=0?'pos':'neg'}">$${pnl7d.toFixed(2)}</div></div>
      <div class="m"><div class="m-l">$/day</div><div class="m-v">${totalDays>0?(totalPnl/totalDays).toFixed(2):'—'}</div></div>
    </div>`;
  if (allExp) {
    h += `<div class="mg mg3">
      <div class="m"><div class="m-l">Expectancy</div><div class="m-v ${allExp.exp>=0?'pos':'neg'}">$${allExp.exp.toFixed(3)}</div></div>
      <div class="m"><div class="m-l">Profit Factor</div><div class="m-v">${allExp.pf>=99?'∞':allExp.pf.toFixed(2)}</div></div>
      <div class="m"><div class="m-l">Win Rate</div><div class="m-v">${(allExp.winRate*100).toFixed(0)}%</div></div>
    </div>
    <div class="mg mg3">
      <div class="m"><div class="m-l">Avg Win</div><div class="m-v pos">$${allExp.avgWin.toFixed(3)}</div></div>
      <div class="m"><div class="m-l">Avg Loss</div><div class="m-v neg">$${allExp.avgLoss.toFixed(3)}</div></div>
      <div class="m"><div class="m-l">Trades</div><div class="m-v">${allExp.totalWins+allExp.totalLosses}</div></div>
    </div>`;
  }
  h += `<div class="mg mg2">
    <div class="m"><div class="m-l">Recovery Factor</div><div class="m-v">${rfVal>=99?'∞':rfVal.toFixed(1)}</div></div>
    <div class="m"><div class="m-l">Loss Streak</div><div class="m-v ${streak>=4?'neg':''}">${streak}d</div></div>
  </div>
  <div class="dim" style="font-size:8px">Expectancy and PF use real grossWin/grossLoss from trade data</div>
  </div>`;

  h += '</div>'; // close g2

  // Pair ranking table
  if (L.pairs && L.pairs.length > 1) {
    h += `<div class="card"><div class="card-t">Pair Ranking (by $/day)</div><table>
      <tr><th>Pair</th><th class="tar">Total P&L</th><th class="tar">$/day</th><th class="tar">Expectancy</th><th class="tar">PF</th><th class="tar">Win Rate</th><th class="tar">BCR</th><th class="tar">Days</th></tr>`;

    const pairStats = L.pairs.map(p => {
      const pd = D.filter(d=>d.pair===p.n);
      const tPnl = pd.reduce((s,d)=>s+(d.pnl||0),0);
      const days = new Set(pd.map(d=>d.date)).size;
      const exp = calcExpectancy(pd, null);
      // BCR using real grossWin
      const totalGWin = pd.reduce((s,d)=>s+(d.grossWin||0),0);
      const totalBlkPnl = pd.reduce((s,d)=>s+Math.abs(d.blkPnl||0),0);
      const bcr = totalGWin>0?(totalBlkPnl/totalGWin*100):0;
      return { n:p.n, tPnl, days, daily:days>0?tPnl/days:0, exp, bcr };
    }).sort((a,b) => b.daily - a.daily);

    for (const ps of pairStats) {
      h += `<tr><td style="font-weight:700">${ps.n}</td>
        <td class="tar ${ps.tPnl>=0?'pos':'neg'}">$${ps.tPnl.toFixed(2)}</td>
        <td class="tar ${ps.daily>=0?'pos':'neg'}">${ps.daily.toFixed(2)}</td>
        <td class="tar">${ps.exp?'$'+ps.exp.exp.toFixed(3):'—'}</td>
        <td class="tar">${ps.exp?(ps.exp.pf>=99?'∞':ps.exp.pf.toFixed(2)):'—'}</td>
        <td class="tar">${ps.exp?(ps.exp.winRate*100).toFixed(0)+'%':'—'}</td>
        <td class="tar ${ps.bcr>20?'neg':ps.bcr>10?'warn':''}">${ps.bcr.toFixed(1)}%</td>
        <td class="tar dim">${ps.days}</td></tr>`;
    }
    h += '</table></div>';
  }

  el.innerHTML = h;
}

function renderHistory() {

  let h = '';

  // Summary row
  const totalPnl = D.reduce((s,d)=>s+(d.pnl||0),0);
  const totalDays = new Set(D.map(d=>d.date)).size;
  const pnl7d = calc7dPnl(D);
  const totalWd = S.withdrawals.reduce((s,w)=>s+w.amt,0);

  h += `<div class="card"><div class="mg mg4">
    <div class="m"><div class="m-l">All-Time P&L</div><div class="m-v ${totalPnl>=0?'pos':'neg'}" style="font-size:20px">$${totalPnl.toFixed(2)}</div></div>
    <div class="m"><div class="m-l">7d P&L</div><div class="m-v ${pnl7d>=0?'pos':'neg'}">$${pnl7d.toFixed(2)}</div></div>
    <div class="m"><div class="m-l">$/day avg</div><div class="m-v">${totalDays>0?(totalPnl/totalDays).toFixed(2):'—'}</div></div>
    <div class="m"><div class="m-l">Withdrawn</div><div class="m-v">$${totalWd.toFixed(0)}</div></div>
  </div></div>`;

  // Equity chart
  if (snaps.length > 2) {
    h += `<div class="card"><div class="card-t">Equity (${snaps.length} snapshots)</div>
      <div class="chart-wrap">${renderEquityChart(snaps)}</div></div>`;
  }

  // Daily P&L bars
  const byDate = {};
  for (const d of D) { byDate[d.date] = (byDate[d.date]||0) + (d.pnl||0); }
  const dates = Object.keys(byDate).sort();
  if (dates.length > 0) {
    h += `<div class="card"><div class="card-t">Daily P&L</div>
      <div class="chart-wrap">${renderDailyBars(dates, byDate)}</div></div>`;
  }

  // Cumulative P&L
  if (dates.length > 1) {
    h += `<div class="card"><div class="card-t">Cumulative P&L</div>
      <div class="chart-wrap">${renderCumPnl(dates, byDate)}</div></div>`;
  }

  // Daily table
  if (dates.length > 0) {
    h += `<div class="card"><div class="card-t">Daily Detail (${dates.length} days)</div><table>
      <tr><th>Date</th><th class="tar">P&L</th><th class="tar">Wins</th><th class="tar">Losses</th><th class="tar">Closed</th></tr>`;
    for (const dt of [...dates].reverse()) {
      const pnl = byDate[dt];
      const dayPairs = D.filter(d=>d.date===dt);
      const wins = dayPairs.reduce((s,d)=>s+(d.wins||0),0);
      const losses = dayPairs.reduce((s,d)=>s+(d.losses||0),0);
      h += `<tr><td>${dt}</td><td class="tar ${pnl>=0?'pos':'neg'}" style="font-weight:600">$${pnl.toFixed(2)}</td>
        <td class="tar pos">${wins}</td><td class="tar neg">${losses}</td><td class="tar dim">${wins+losses}</td></tr>`;
    }
    h += '</table></div>';
  }

  // Withdrawals
  h += `<div class="card"><div class="fxb"><div class="card-t" style="margin:0">Withdrawals ($${totalWd.toFixed(0)})</div>
    <button class="btn-sm" onclick="addWithdrawal()">+ Add</button></div>`;
  if (S.withdrawals.length > 0) {
    for (const w of [...S.withdrawals].reverse()) {
      h += `<div class="row"><span class="row-l">${w.date}</span><span class="row-v">$${w.amt.toFixed(0)}</span></div>`;
    }
  } else { h += '<div class="dim tac" style="padding:12px;font-size:10px">No withdrawals recorded</div>'; }
  h += '</div>';

  el.innerHTML = h;
}

// ============================================================
// Charts
// ============================================================
function renderEquityChart(snaps) {
  const W=500, H=140, P=30;
  const eqs=snaps.map(s=>s.eq), bals=snaps.map(s=>s.bal);
  const all=[...bals,...eqs]; const min=Math.min(...all)*0.998, max=Math.max(...all)*1.002, range=max-min||1;
  function pts(arr){ return arr.map((v,i)=>{const x=P+(i/(arr.length-1))*(W-P*2);const y=P/2+(1-(v-min)/range)*(H-P);return x.toFixed(1)+','+y.toFixed(1);}).join(' '); }
  let labels='';
  for(let i=0;i<=4;i++){const val=min+(range*i/4);const y=P/2+(1-i/4)*(H-P);
    labels+=`<text x="${P-4}" y="${y+3}" fill="var(--mt)" font-size="8" text-anchor="end">$${val.toFixed(0)}</text>`;
    labels+=`<line x1="${P}" y1="${y}" x2="${W-P}" y2="${y}" stroke="var(--bd)" stroke-width="0.5"/>`;}
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:140px">${labels}
    <polyline points="${pts(bals)}" fill="none" stroke="var(--dim)" stroke-width="1" stroke-dasharray="3,2"/>
    <polyline points="${pts(eqs)}" fill="none" stroke="var(--blu)" stroke-width="1.5" stroke-linejoin="round"/>
  </svg><div class="fxb dim" style="font-size:8px"><span>— Balance</span><span style="color:var(--blu)">— Equity</span></div>`;
}

function renderDailyBars(dates, byDate) {
  const W=500, H=100, P=30;
  const vals=dates.map(d=>byDate[d]); const maxAbs=Math.max(1,...vals.map(Math.abs));
  const barW=Math.max(2,Math.min(14,(W-P*2)/dates.length-1)); const mid=H/2;
  let bars='';
  for(let i=0;i<dates.length;i++){const v=vals[i];const x=P+(i/dates.length)*(W-P*2);
    const barH=Math.abs(v)/maxAbs*(H/2-5);const y=v>=0?mid-barH:mid;const col=v>=0?'var(--grn)':'var(--red)';
    bars+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW}" height="${Math.max(1,barH).toFixed(1)}" fill="${col}" rx="1"/>`;}
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:100px">
    <line x1="${P}" y1="${mid}" x2="${W-P}" y2="${mid}" stroke="var(--mt)" stroke-width="0.5"/>
    <text x="${P-4}" y="${mid+3}" fill="var(--mt)" font-size="8" text-anchor="end">$0</text>
    <text x="${P-4}" y="12" fill="var(--mt)" font-size="8" text-anchor="end">+$${maxAbs.toFixed(0)}</text>
    <text x="${P-4}" y="${H-2}" fill="var(--mt)" font-size="8" text-anchor="end">-$${maxAbs.toFixed(0)}</text>
    ${bars}</svg>`;
}

function renderCumPnl(dates, byDate) {
  const W=500, H=120, P=30;
  let cum=0; const vals=[]; for(const dt of dates){cum+=byDate[dt];vals.push(cum);}
  const min=Math.min(0,...vals), max=Math.max(0,...vals); const range=max-min||1;
  const pts=vals.map((v,i)=>{const x=P+(i/(vals.length-1))*(W-P*2);const y=P/2+(1-(v-min)/range)*(H-P);return x.toFixed(1)+','+y.toFixed(1);}).join(' ');
  // Zero line
  const zeroY=P/2+(1-(0-min)/range)*(H-P);
  let labels='';
  for(let i=0;i<=4;i++){const val=min+(range*i/4);const y=P/2+(1-i/4)*(H-P);
    labels+=`<text x="${P-4}" y="${y+3}" fill="var(--mt)" font-size="8" text-anchor="end">$${val.toFixed(0)}</text>`;}
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:120px">${labels}
    <line x1="${P}" y1="${zeroY}" x2="${W-P}" y2="${zeroY}" stroke="var(--mt)" stroke-width="0.5" stroke-dasharray="3,2"/>
    <polyline points="${pts}" fill="none" stroke="var(--grn)" stroke-width="2" stroke-linejoin="round"/>
  </svg>`;
}

// ============================================================

function addWithdrawal() {
  const amt = prompt('Withdrawal amount ($):');
  if (!amt || isNaN(parseFloat(amt))) return;
  const date = prompt('Date (YYYY.MM.DD):', new Date().toISOString().substring(0,10).replace(/-/g,'.'));
  if (!date) return;
  S.withdrawals.push({ amt: parseFloat(amt), date });
  localStorage.setItem('tm_wd', JSON.stringify(S.withdrawals));
  render();
}

function generateDemoSnapshots(now) {
  const snaps = [];
  const baseEq = 502, baseBal = 510;
  for (let i = 480; i >= 0; i--) {
    const t = new Date(now.getTime() - i * 180000);
    const noise = Math.sin(i * 0.05) * 4 + Math.random() * 3 - 1.5;
    const trend = (480 - i) * 0.01;
    const eq = baseEq + noise + trend;
    const bal = baseBal + trend + (Math.random() > 0.85 ? 0.2 : 0);
    snaps.push({
      ts: t.toISOString().replace('T',' ').substring(0,19),
      bal: parseFloat(bal.toFixed(2)),
      eq: parseFloat(eq.toFixed(2)),
      dd: parseFloat((Math.max(0, (bal - eq) / bal * 100)).toFixed(2)),
      trades: 6 + Math.floor(Math.random() * 6),
      def: 0, hour: t.getUTCHours(), dow: t.getUTCDay(),
      session: t.getUTCHours() >= 7 && t.getUTCHours() < 12 ? 'London' : t.getUTCHours() >= 12 && t.getUTCHours() < 16 ? 'Overlap' : t.getUTCHours() >= 16 && t.getUTCHours() < 21 ? 'NY' : 'Asian',
      eurCorr: 0
    });
  }
  return snaps;
}

function generateDemoDaily(now) {
  const pairs = ['EURUSD','EURGBP','GBPAUD'];
  const daily = [];
  for (let d = 13; d >= 0; d--) {
    const dt = new Date(now.getTime() - d * 86400000);
    const dateStr = dt.toISOString().substring(0,10).replace(/-/g,'.');
    for (const pair of pairs) {
      const base = pair === 'EURUSD' ? 0.6 : pair === 'EURGBP' ? 0.35 : 0.25;
      const variance = (Math.random() - 0.4) * 1.5;
      const pnl = parseFloat((base + variance).toFixed(2));
      const wins = 3 + Math.floor(Math.random() * 8);
      const losses = 1 + Math.floor(Math.random() * 4);
      const gWin = parseFloat((wins * (0.15 + Math.random() * 0.12)).toFixed(2));
      const gLoss = parseFloat((losses * (0.08 + Math.random() * 0.10)).toFixed(2));
      const blkC = Math.random() > 0.7 ? Math.floor(Math.random() * 3) : 0;
      const blkPnl = blkC > 0 ? parseFloat((-blkC * (0.05 + Math.random() * 0.08)).toFixed(2)) : 0;
      daily.push({
        date: dateStr, pair,
        pnl, wins, losses, closed: wins + losses,
        avgDur: 30 + Math.floor(Math.random() * 120),
        blkClosed: blkC, blkPnl,
        bal: 500 + (13 - d) * 0.9,
        eq: 498 + (13 - d) * 0.85,
        peak: 500 + (13 - d) * 0.95,
        grossWin: gWin, grossLoss: gLoss
      });
    }
  }
  return daily;
}

function generateDemoIndicators(now) {
  const pairs = ['EURUSD','EURGBP','GBPAUD'];
  const indicators = [];
  for (let i = 336; i >= 0; i--) { // 7 days at 3-min = ~3360 but sampling every 10th
    if (i % 10 !== 0) continue;
    const t = new Date(now.getTime() - i * 180000);

      indicators.push({
        ts: t.toISOString().replace('T',' ').substring(0,19),

        adxH4: 15 + Math.random() * 15,
        prcPct: 20 + Math.random() * 60
      });
    }
  }
  return indicators;
}
