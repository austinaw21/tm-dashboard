<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>TM Dashboard</title>
<style>
:root{
  --bg:#0a0e17;--sf:#111827;--sf2:#1a2235;--bd:#1e293b;
  --tx:#e2e8f0;--dim:#94a3b8;--mt:#64748b;
  --grn:#22c55e;--grn2:rgba(34,197,94,.12);--grnB:rgba(34,197,94,.3);
  --amb:#f59e0b;--amb2:rgba(245,158,11,.12);--ambB:rgba(245,158,11,.3);
  --red:#ef4444;--red2:rgba(239,68,68,.12);--redB:rgba(239,68,68,.3);
  --blu:#3b82f6;--blu2:rgba(59,130,246,.1);--bluB:rgba(59,130,246,.3);
  --cyn:#06b6d4;--cyn2:rgba(6,182,212,.12);
  --r:8px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:'SF Mono','Fira Code','JetBrains Mono','Courier New',monospace;
  max-width:480px;margin:0 auto;min-height:100vh;font-size:12px;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:0;height:0}

/* Header */
.hdr{position:sticky;top:0;z-index:20;background:var(--bg);border-bottom:1px solid var(--bd);padding:10px 14px 6px}
.hdr-top{display:flex;justify-content:space-between;align-items:center}
.hdr-title{font-size:13px;font-weight:700;letter-spacing:.5px}
.hdr-title .a{color:var(--blu)}
.hdr-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-left:6px}
.hdr-sub{display:flex;justify-content:space-between;align-items:center;margin-top:2px}
.hdr-strip{display:flex;gap:10px;margin-top:6px;font-size:11px}
.hdr-strip .v{font-weight:600}
.session-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;background:var(--cyn2);color:var(--cyn);letter-spacing:.3px}

/* Tabs */
.tabs{position:sticky;top:56px;z-index:15;background:var(--bg);display:flex;border-bottom:1px solid var(--bd)}
.tab{flex:1;padding:8px 0;text-align:center;font-size:10px;font-weight:600;letter-spacing:.5px;
  color:var(--mt);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab.on{color:var(--blu);border-bottom-color:var(--blu)}

/* Content */
.pane{display:none;padding:10px 12px 80px}
.pane.on{display:block}

/* Cards */
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:12px;margin-bottom:10px}
.card-t{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--mt);margin-bottom:8px}

/* Metrics */
.mg{display:grid;gap:6px;margin-bottom:8px}
.mg3{grid-template-columns:repeat(3,1fr)}
.mg2{grid-template-columns:repeat(2,1fr)}
.mg4{grid-template-columns:repeat(4,1fr)}
.m{background:var(--sf2);border-radius:6px;padding:6px 8px}
.m-l{font-size:9px;color:var(--dim);margin-bottom:1px}
.m-v{font-size:15px;font-weight:600}

/* Action bar */
.action-bar{border-radius:var(--r);padding:10px 12px;margin-bottom:10px;font-size:11px;line-height:1.5}
.action-bar .label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.action-bar .msg{font-weight:500}
.action-bar .blockers{font-size:10px;color:var(--dim);margin-top:4px}

/* Pill */
.pill{display:inline-block;font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;letter-spacing:.3px}

/* Progress bar */
.pbar{height:6px;background:var(--sf2);border-radius:3px;overflow:hidden;margin:4px 0}
.pbar-fill{height:100%;border-radius:3px;transition:width .5s}

/* Percentile bar */
.pctl-bar{position:relative;height:10px;background:linear-gradient(90deg,var(--red2),var(--sf2) 30%,var(--sf2) 70%,var(--red2));border-radius:5px;margin:4px 0}
.pctl-dot{position:absolute;top:0;width:10px;height:10px;border-radius:50%;background:var(--tx);border:2px solid var(--blu);transform:translateX(-50%)}

/* Row */
.row{display:flex;justify-content:space-between;align-items:center;padding:5px 0}
.row+.row{border-top:1px solid var(--bd)}
.row-l{font-size:10px;color:var(--dim)}
.row-v{font-size:11px;font-weight:600}

/* Alert */
.alert{border-radius:6px;padding:8px 10px;margin-bottom:8px;font-size:11px;display:flex;gap:6px;align-items:flex-start}
.alert-icon{font-size:14px;flex-shrink:0;line-height:1}

/* Pair cards */
.pcard{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:10px;margin-bottom:8px}
.pcard-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.pcard-name{font-size:12px;font-weight:700}

/* Condition badge */
.cond{font-size:9px;font-weight:700;padding:3px 8px;border-radius:10px;letter-spacing:.3px}

/* Badge */
.badge{display:flex;gap:4px;flex-wrap:wrap;margin:4px 0}
.bdg{font-size:8px;font-weight:700;padding:2px 5px;border-radius:4px;letter-spacing:.3px}

/* Chart */
.chart-wrap{background:var(--sf2);border-radius:6px;padding:8px;margin:6px 0}
svg text{font-family:inherit}

/* Collapsible */
.coll-btn{width:100%;background:none;border:none;color:var(--dim);font:inherit;font-size:10px;
  padding:6px 0;cursor:pointer;text-align:center}
.coll-body{display:none}
.coll-body.open{display:block}

/* Connect screen */
.connect{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:80vh;padding:30px;text-align:center}
.connect h2{font-size:16px;margin-bottom:6px}
.connect p{font-size:11px;color:var(--dim);margin-bottom:20px}
.connect input{width:100%;background:var(--sf);border:1px solid var(--bd);border-radius:6px;
  color:var(--tx);font:inherit;font-size:12px;padding:10px;margin-bottom:10px}
.connect input:focus{outline:none;border-color:var(--blu)}
.connect button{background:var(--blu);color:#fff;border:none;border-radius:6px;
  font:inherit;font-weight:700;font-size:12px;padding:10px 24px;cursor:pointer}

/* Utility */
.neg{color:var(--red)}.pos{color:var(--grn)}.warn{color:var(--amb)}
.dim{color:var(--dim)}.mt4{margin-top:4px}.mb4{margin-bottom:4px}
.tac{text-align:center}.tar{text-align:right}
.fx{display:flex}.fxb{display:flex;justify-content:space-between;align-items:center}
.gap4{gap:4px}.gap8{gap:8px}
.f1{flex:1}
.hidden{display:none}
</style>
</head>
<body>

<div id="app">
  <div class="connect" id="connectScreen">
    <h2>TM Dashboard</h2>
    <p>Paste your Google Apps Script URL to connect</p>
    <input id="urlInput" placeholder="https://script.google.com/macros/s/.../exec" spellcheck="false">
    <button onclick="saveUrl()">Connect</button>
    <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--bd);width:100%">
      <p style="font-size:10px;color:var(--mt);margin-bottom:8px">Or preview with sample data</p>
      <button onclick="loadDemo()" style="background:var(--sf2);border:1px solid var(--bd);color:var(--dim)">Demo Mode</button>
    </div>
  </div>

  <div id="dashboard" class="hidden">
    <div class="hdr" id="hdr"></div>
    <div class="tabs" id="tabs">
      <div class="tab on" data-t="status">STATUS</div>
      <div class="tab" data-t="pairs">PAIRS</div>
      <div class="tab" data-t="pnl">P&L</div>
    </div>
    <div class="pane on" id="p-status"></div>
    <div class="pane" id="p-pairs"></div>
    <div class="pane" id="p-pnl"></div>
  </div>
</div>

<script>
// ============================================================
// State
// ============================================================
const S = {
  url: localStorage.getItem('tm_url') || '',
  data: null,       // { latest, snapshots, daily }
  indicators: null,  // indicator history (24h)
  err: null,
  loading: false,
  tab: 'status',
  refreshMs: 180000,
  timer: null,
};

// ============================================================
// Boot
// ============================================================
if (S.url) { showDashboard(); fetchData(); }
else { document.getElementById('connectScreen').classList.remove('hidden'); loadDemo(); }

function saveUrl() {
  const v = document.getElementById('urlInput').value.trim();
  if (v.length < 10) return;
  S.url = v;
  localStorage.setItem('tm_url', v);
  showDashboard();
  fetchData();
}

function showDashboard() {
  document.getElementById('connectScreen').classList.add('hidden');
  document.getElementById('dashboard').classList.remove('hidden');
  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('on'));
      document.querySelectorAll('.pane').forEach(x => x.classList.remove('on'));
      t.classList.add('on');
      S.tab = t.dataset.t;
      document.getElementById('p-' + S.tab).classList.add('on');
    });
  });
}

// ============================================================
// Data fetching — two endpoints
// ============================================================
async function fetchData() {
  S.loading = true;
  renderHeader();
  try {
    const [mainR, indR] = await Promise.all([
      fetch(S.url + '?action=all'),
      fetch(S.url + '?action=indicators&hours=24')
    ]);
    const mainText = await mainR.text();
    if (mainText.trim().charAt(0) !== '{') {
      S.err = 'Response is not JSON — check URL';
    } else {
      const d = JSON.parse(mainText);
      if (d.status === 'ok') { S.data = d; S.err = null; }
      else S.err = d.msg || 'Unknown error';
    }
    try {
      const indText = await indR.text();
      const indD = JSON.parse(indText);
      if (indD.status === 'ok') S.indicators = indD.indicators || [];
    } catch(e) { S.indicators = []; }
  } catch(e) { S.err = e.message; }
  S.loading = false;
  render();
  clearTimeout(S.timer);
  S.timer = setTimeout(fetchData, S.refreshMs);
}

// ============================================================
// Regime calculation — Option B full integration
// ============================================================
function calcRegime() {
  if (!S.data || !S.data.latest) return { r:'OFFLINE', c:'var(--mt)', reasons:[], gates:[], primeBlockers:[] };
  const L = S.data.latest;
  const D = S.data.daily || [];

  // DEFENSIVE from TM
  if (L.tm && L.tm.def) return { r:'DEFENSIVE', c:'var(--red)', reasons:['TM defensive mode active'], gates:[], primeBlockers:[] };

  const cautionR = [];
  const primeBlock = [];

  // --- EXISTING CAUTION TRIGGERS ---
  if (L.acct && L.tm && L.acct.dd >= L.tm.ddSoft)
    cautionR.push('DD ' + L.acct.dd.toFixed(1) + '% ≥ ' + L.tm.ddSoft + '%');

  if (L.pairs) {
    for (const p of L.pairs) {
      const grid = Math.max(p.buyN || 0, p.sellN || 0);
      const adxPct = p.adxR > 0 ? (p.adx / p.adxR) : 0;

      // Existing CAUTION
      if (adxPct >= 0.8 && p.brk) cautionR.push(p.n + ' ADX ' + p.adx.toFixed(0) + ' (' + (adxPct*100).toFixed(0) + '%)');
      if (grid >= 6) cautionR.push(p.n + ' grid depth ' + grid + ' trades');
      if (p.atrR >= 1.3) cautionR.push(p.n + ' ATR ' + p.atrR.toFixed(1) + 'x');
      if (p.fb) cautionR.push(p.n + ' float breaker');

      // --- NEW CAUTION TRIGGERS ---
      // Grid depth in pips
      const maxDepth = Math.max(p.buyDepth || 0, p.sellDepth || 0);
      if (maxDepth >= 50) cautionR.push(p.n + ' grid ' + maxDepth.toFixed(0) + ' pips deep');

      // Grid velocity
      const maxVel = Math.max(p.buyVel || 0, p.sellVel || 0);
      if (maxVel >= 3) cautionR.push(p.n + ' velocity ' + maxVel + ' trades/hr');

      // Oldest trade age >= 24h
      const maxAge = Math.max(p.oldBuyAge || 0, p.oldSellAge || 0);
      if (maxAge >= 1440) cautionR.push(p.n + ' stuck grid ' + Math.floor(maxAge/60) + 'h');

      // H4 ADX divergence — H4 trending against dominant grid, H1 hasn't caught up
      if ((p.adxH4 || 0) >= 25 && adxPct < 0.8) {
        const h4Bull = (p.diPH4 || 0) > (p.diMH4 || 0);
        const dominantSide = (p.buyN || 0) >= (p.sellN || 0) ? 'buy' : 'sell';
        if ((dominantSide === 'buy' && !h4Bull) || (dominantSide === 'sell' && h4Bull)) {
          cautionR.push(p.n + ' H4 trend developing against ' + dominantSide + ' grid');
        }
      }

      // --- EXISTING PRIME BLOCKERS ---
      if (adxPct >= 0.7) primeBlock.push(p.n + ' ADX ' + (adxPct*100).toFixed(0) + '%');
      if (p.atrR >= 1.1) primeBlock.push(p.n + ' ATR ' + p.atrR.toFixed(1) + 'x');
      if (grid > 4) primeBlock.push(p.n + ' grid ' + grid + ' trades');

      // --- NEW PRIME BLOCKERS ---
      if (maxDepth > 20) primeBlock.push(p.n + ' grid ' + maxDepth.toFixed(0) + ' pips');
      if (maxAge > 360) primeBlock.push(p.n + ' trade open ' + Math.floor(maxAge/60) + 'h');

      // Price percentile against grid
      const prcPct = p.prcPct || 50;
      if ((p.buyN || 0) > 0 && prcPct > 80) primeBlock.push(p.n + ' buys at ' + prcPct.toFixed(0) + ' pctl');
      if ((p.sellN || 0) > 0 && prcPct < 20) primeBlock.push(p.n + ' sells at ' + prcPct.toFixed(0) + ' pctl');

      // ADX slope rising with counter-trend grid
      if ((p.adxSlp || 0) > 0 && grid > 0) {
        const h1Bull = (p.diP || 0) > (p.diM || 0);
        const domSide = (p.buyN || 0) >= (p.sellN || 0) ? 'buy' : 'sell';
        if ((domSide === 'buy' && !h1Bull) || (domSide === 'sell' && h1Bull)) {
          primeBlock.push(p.n + ' ADX rising against grid');
        }
      }

      // RSI extreme against grid
      const rsi = p.rsi || 50;
      if ((p.buyN || 0) > (p.sellN || 0) && rsi > 72) primeBlock.push(p.n + ' RSI ' + rsi.toFixed(0) + ' (overbought w/ buys)');
      if ((p.sellN || 0) > (p.buyN || 0) && rsi < 28) primeBlock.push(p.n + ' RSI ' + rsi.toFixed(0) + ' (oversold w/ sells)');
    }
  }

  // EUR Correlation — both CAUTION and PRIME blocker
  if (L.eurCorr) {
    cautionR.push('EUR pairs correlated — doubled exposure');
  }

  // Loss streak
  const streak = calcLossStreak(D);
  if (streak >= 4) cautionR.push(streak + '-day loss streak');

  if (cautionR.length > 0) return { r:'CAUTION', c:'var(--amb)', reasons:cautionR, gates:[], primeBlockers:primeBlock };

  // --- PRIME evaluation ---
  const pnl7d = calc7dPnl(D);
  if (pnl7d <= 0) primeBlock.push('7d P&L $' + pnl7d.toFixed(2));
  const rf = calcRF(D);
  if (rf < 1.5 && rf >= 0) primeBlock.push('RF ' + rf.toFixed(1));
  if (L.acct) {
    const cushion = L.acct.eq - L.acct.floor;
    const dd7d = calc7dMaxDD();
    if (cushion > 0 && dd7d > cushion * 0.4) primeBlock.push('7d DD > 40% cushion');
  }
  if (L.eurCorr) primeBlock.push('EUR correlation active');

  if (primeBlock.length === 0) return { r:'PRIME', c:'var(--grn)', reasons:[], gates:[], primeBlockers:[] };
  return { r:'NORMAL', c:'var(--blu)', reasons:[], gates:[], primeBlockers:primeBlock };
}

// ============================================================
// Helpers
// ============================================================
function calcLossStreak(daily) {
  if (!daily || daily.length === 0) return 0;
  const byDate = {};
  for (const d of daily) { byDate[d.date] = (byDate[d.date]||0) + (d.pnl||0); }
  let s = 0;
  for (const dt of Object.keys(byDate).sort().reverse()) { if (byDate[dt] < 0) s++; else break; }
  return s;
}

function calc7dPnl(daily) {
  if (!daily) return 0;
  const c = new Date(); c.setDate(c.getDate()-7);
  const cs = c.toISOString().substring(0,10).replace(/-/g,'.');
  return daily.filter(d=>d.date>=cs).reduce((s,d)=>s+(d.pnl||0),0);
}

function calcRF(daily) {
  if (!daily || !daily.length) return 0;
  const bd = {};
  for (const d of daily) bd[d.date] = (bd[d.date]||0) + (d.pnl||0);
  let cum=0, pk=0, mdd=0;
  for (const dt of Object.keys(bd).sort()) { cum+=bd[dt]; if(cum>pk) pk=cum; const dd=pk-cum; if(dd>mdd) mdd=dd; }
  return mdd<=0 ? (cum>0?99:0) : cum/mdd;
}

function calc7dMaxDD() {
  if (!S.data || !S.data.snapshots) return 0;
  let mx = 0;
  for (const s of S.data.snapshots) if(s.dd > mx) mx = s.dd;
  return (S.data.latest ? S.data.latest.acct.bal : 0) * mx / 100;
}

function calcLots() {
  if (!S.data || !S.data.latest) return null;
  const L = S.data.latest;
  const reg = calcRegime();
  const pairs = L.pairs ? L.pairs.length : 1;
  const cushion = L.acct.eq - L.acct.floor;
  const perPair = pairs > 0 ? cushion / pairs : cushion;

  const hardMax = Math.max(0.01, Math.floor(perPair / 100) * 0.01);
  const tierMax = Math.max(0.01, Math.floor(perPair / 150) * 0.01);

  let rec;
  switch(reg.r) {
    case 'PRIME': rec = tierMax; break;
    case 'NORMAL': rec = Math.min(hardMax, L.acct.baseLots || 0.01); break;
    case 'CAUTION': rec = L.acct.baseLots || 0.01; break;
    case 'DEFENSIVE': rec = 0.01; break;
    default: rec = L.acct.baseLots || 0.01;
  }
  rec = Math.max(0.01, rec);

  const pct = hardMax > 0.01 ? Math.min(100, ((rec - 0.01) / (hardMax - 0.01)) * 100) : 0;
  return { rec, hardMax, tierMax, cushion, perPair, pct, regime: reg };
}

function calcExpectancy(daily, pairName) {
  const rows = pairName ? daily.filter(d => d.pair === pairName) : daily;
  let totalGWin = 0, totalGLoss = 0, totalWins = 0, totalLosses = 0;
  for (const d of rows) {
    totalGWin += d.grossWin || 0;
    totalGLoss += d.grossLoss || 0;
    totalWins += d.wins || 0;
    totalLosses += d.losses || 0;
  }
  const total = totalWins + totalLosses;
  if (total === 0) return null;
  const winRate = totalWins / total;
  const avgWin = totalWins > 0 ? totalGWin / totalWins : 0;
  const avgLoss = totalLosses > 0 ? totalGLoss / totalLosses : 0;
  const exp = (winRate * avgWin) - ((1 - winRate) * avgLoss);
  const pf = totalGLoss > 0 ? totalGWin / totalGLoss : (totalGWin > 0 ? 99 : 0);
  return { exp, pf, winRate, avgWin, avgLoss, totalWins, totalLosses };
}

function pairCondition(p) {
  // Returns 'favorable', 'neutral', or 'unfavorable' based on current indicators
  let score = 0; // positive = favorable, negative = unfavorable
  const reasons = [];

  // ADX — low = good for grids
  const adxPct = p.adxR > 0 ? p.adx / p.adxR : 0;
  if (adxPct < 0.5) { score += 1; reasons.push('Low ADX'); }
  else if (adxPct >= 0.8) { score -= 2; reasons.push('High ADX'); }
  else if (adxPct >= 0.7) { score -= 1; }

  // BBW — tight = squeeze = good
  const bbw = p.bbw || 0;
  if (bbw > 0 && bbw < 0.005) { score += 1; reasons.push('Tight BBW'); }
  else if (bbw > 0.015) { score -= 1; reasons.push('Wide BBW'); }

  // Grid depth — deep = bad
  const maxDepth = Math.max(p.buyDepth || 0, p.sellDepth || 0);
  if (maxDepth > 50) { score -= 2; reasons.push('Deep grid'); }
  else if (maxDepth > 20) { score -= 1; }
  else if (maxDepth === 0) { score += 1; }

  // Daily range consumed — high = less room for trouble
  const rngPct = p.rngPct || 50;
  if (rngPct > 80) { score += 1; reasons.push('Range spent'); }

  // Grid velocity
  const maxVel = Math.max(p.buyVel || 0, p.sellVel || 0);
  if (maxVel >= 3) { score -= 2; reasons.push('Rapid stacking'); }

  // ATR ratio
  if (p.atrR >= 1.3) { score -= 1; reasons.push('High ATR'); }
  else if (p.atrR < 0.8) { score += 1; reasons.push('Calm market'); }

  let label, col;
  if (score >= 2) { label = 'FAVORABLE'; col = 'var(--grn)'; }
  else if (score <= -2) { label = 'UNFAVORABLE'; col = 'var(--red)'; }
  else { label = 'NEUTRAL'; col = 'var(--dim)'; }

  return { label, col, reasons, score };
}

// ============================================================
// Render
// ============================================================
function render() {
  renderHeader();
  renderStatus();
  renderPairs();
  renderPnl();
}

// ============================================================
// Header
// ============================================================
function renderHeader() {
  const el = document.getElementById('hdr');
  if (!S.data || !S.data.latest) {
    el.innerHTML = `<div class="hdr-top"><span class="hdr-title"><span class="a">TM</span> Dashboard</span>
      <span class="dim" style="font-size:10px">${S.loading ? 'Loading...' : (S.err || 'No data')}</span></div>`;
    return;
  }
  const L = S.data.latest;
  const a = L.acct;
  const reg = calcRegime();
  const session = L.session || '';
  el.innerHTML = `<div class="hdr-top">
    <span class="hdr-title"><span class="a">TM</span> Dashboard <span class="hdr-dot" style="background:${reg.c}"></span></span>
    <span class="fx gap4" style="align-items:center">
      ${session ? '<span class="session-badge">' + session.toUpperCase() + '</span>' : ''}
      <span class="dim" style="font-size:9px">${L.ts ? L.ts.substring(11,16) : ''}</span>
    </span>
  </div>
  <div class="hdr-strip">
    <span>E <span class="v">$${a.eq.toFixed(0)}</span></span>
    <span>DD <span class="v ${a.dd > 10 ? 'neg' : a.dd > 5 ? 'warn' : ''}">${a.dd.toFixed(1)}%</span></span>
    <span>F <span class="v ${(a.eq-a.floor)<50?'neg':'pos'}">$${(a.eq-a.floor).toFixed(0)}</span></span>

function buildActionBar(reg, lots) {
  let msg = '', blockerStr = '';
  const bgAlpha = '18', borderAlpha = '33';

  switch(reg.r) {
    case 'PRIME':
      msg = 'All gates clear. Conditions are prime for scaling.';
      if (lots) msg += ' Lot recommendation: ' + lots.rec.toFixed(2);
      break;
    case 'NORMAL':
      msg = 'Operating normally. Not yet clear for scaling.';
      if (reg.primeBlockers && reg.primeBlockers.length > 0) {
        // Find the closest-to-flipping blocker (shortest string = simplest = closest)
        blockerStr = reg.primeBlockers.slice(0, 3).join(' · ');
      }
      break;
    case 'CAUTION':
      msg = 'Elevated risk detected.';
      if (reg.reasons && reg.reasons.length > 0) {
        blockerStr = reg.reasons.slice(0, 3).join(' · ');
      }
      break;
    case 'DEFENSIVE':
      msg = 'Defensive mode — protecting capital. Lot locked at 0.01.';
      break;
    default:
      msg = 'System offline.';
  }

  return `<div class="action-bar" style="background:${reg.c}${bgAlpha};border:1px solid ${reg.c}${borderAlpha}">
    <div class="label" style="color:${reg.c}">${reg.r}</div>
    <div class="msg">${msg}</div>
    ${blockerStr ? '<div class="blockers">' + blockerStr + '</div>' : ''}
  </div>`;
}

function renderSparkline() {
  if (!S.data || !S.data.snapshots || S.data.snapshots.length < 3) return '';
  const snaps = S.data.snapshots.slice(-60);
  const eqs = snaps.map(s => s.eq);
  const min = Math.min(...eqs) * 0.999;
  const max = Math.max(...eqs) * 1.001;
  const w = 300, ht = 30;
  const pts = eqs.map((v, i) => {
    const x = (i / (eqs.length - 1)) * w;
    const y = ht - ((v - min) / (max - min)) * ht;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  return `<svg viewBox="0 0 ${w} ${ht}" style="width:100%;height:30px;margin-top:6px">
    <polyline points="${pts}" fill="none" stroke="var(--blu)" stroke-width="1.5" stroke-linejoin="round"/>
  </svg>`;
}

function renderEquityChart(snaps) {
  const W = 340, H = 120, P = 25;
  const eqs = snaps.map(s => s.eq);
  const bals = snaps.map(s => s.bal);
  const all = [...bals, ...eqs];
  const min = Math.min(...all) * 0.998;
  const max = Math.max(...all) * 1.002;
  const range = max - min || 1;

  function pts(arr) {
    return arr.map((v, i) => {
      const x = P + (i / (arr.length - 1)) * (W - P * 2);
      const y = P / 2 + (1 - (v - min) / range) * (H - P);
      return `${x.toFixed(1)},${y.toFixed(1)}`;
    }).join(' ');
  }

  const steps = 4;
  let labels = '';
  for (let i = 0; i <= steps; i++) {
    const val = min + (range * i / steps);
    const y = P / 2 + (1 - i / steps) * (H - P);
    labels += `<text x="${P-4}" y="${y+3}" fill="var(--mt)" font-size="8" text-anchor="end">$${val.toFixed(0)}</text>`;
    labels += `<line x1="${P}" y1="${y}" x2="${W-P}" y2="${y}" stroke="var(--bd)" stroke-width="0.5"/>`;
  }

  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:120px">
    ${labels}
    <polyline points="${pts(bals)}" fill="none" stroke="var(--dim)" stroke-width="1" stroke-dasharray="3,2"/>
    <polyline points="${pts(eqs)}" fill="none" stroke="var(--blu)" stroke-width="1.5" stroke-linejoin="round"/>
  </svg>
  <div class="fxb dim" style="font-size:8px"><span>— Balance</span><span style="color:var(--blu)">— Equity</span></div>`;
}

function renderDailyBars(dates, byDate) {
  const W = 340, H = 100, P = 25;
  const vals = dates.map(d => byDate[d]);
  const maxAbs = Math.max(1, ...vals.map(Math.abs));
  const barW = Math.max(2, Math.min(12, (W - P * 2) / dates.length - 1));
  const mid = H / 2;

  let bars = '';
  for (let i = 0; i < dates.length; i++) {
    const v = vals[i];
    const x = P + (i / dates.length) * (W - P * 2);
    const barH = Math.abs(v) / maxAbs * (H / 2 - 5);
    const y = v >= 0 ? mid - barH : mid;
    const col = v >= 0 ? 'var(--grn)' : 'var(--red)';
    bars += `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW}" height="${Math.max(1,barH).toFixed(1)}" fill="${col}" rx="1"/>`;
  }

  const lbls = `<line x1="${P}" y1="${mid}" x2="${W-P}" y2="${mid}" stroke="var(--mt)" stroke-width="0.5"/>
    <text x="${P-4}" y="${mid+3}" fill="var(--mt)" font-size="8" text-anchor="end">$0</text>
    <text x="${P-4}" y="12" fill="var(--mt)" font-size="8" text-anchor="end">+$${maxAbs.toFixed(0)}</text>
    <text x="${P-4}" y="${H-2}" fill="var(--mt)" font-size="8" text-anchor="end">-$${maxAbs.toFixed(0)}</text>`;

  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:100px">${lbls}${bars}</svg>`;
}

function generateDemoSnapshots(now) {
  const snaps = [];
  const baseEq = 502, baseBal = 510;
  for (let i = 480; i >= 0; i--) { // ~24h at 3min intervals
    const t = new Date(now.getTime() - i * 180000);
    const noise = Math.sin(i * 0.05) * 4 + Math.random() * 3 - 1.5;
    const trend = (480 - i) * 0.01;
    const eq = baseEq + noise + trend;
    const bal = baseBal + trend + (Math.random() > 0.85 ? 0.2 : 0);
    snaps.push({
      ts: t.toISOString().replace('T',' ').substring(0,19),
      bal: parseFloat(bal.toFixed(2)),
      eq: parseFloat(eq.toFixed(2)),
      dd: parseFloat((Math.max(0, (bal - eq) / bal * 100)).toFixed(2)),
      trades: 6 + Math.floor(Math.random() * 6),
      def: 0
    });
  }
  return snaps;
}

function generateDemoDaily(now) {
  const pairs = ['EURUSD','EURGBP','GBPAUD'];
  const daily = [];
  for (let d = 13; d >= 0; d--) {
    const dt = new Date(now.getTime() - d * 86400000);
    const dateStr = dt.toISOString().substring(0,10).replace(/-/g,'.');
    for (const pair of pairs) {
      const base = pair === 'EURUSD' ? 0.6 : pair === 'EURGBP' ? 0.35 : 0.25;
      const variance = (Math.random() - 0.4) * 1.5;
      const pnl = parseFloat((base + variance).toFixed(2));
      const wins = 3 + Math.floor(Math.random() * 8);
      const losses = 1 + Math.floor(Math.random() * 4);
      const gWin = parseFloat((wins * (0.15 + Math.random() * 0.12)).toFixed(2));
      const gLoss = parseFloat((losses * (0.08 + Math.random() * 0.10)).toFixed(2));
      const blkC = Math.random() > 0.7 ? Math.floor(Math.random() * 3) : 0;
      const blkPnl = blkC > 0 ? parseFloat((-blkC * (0.05 + Math.random() * 0.08)).toFixed(2)) : 0;
      daily.push({
        date: dateStr, pair,
        pnl, wins, losses, closed: wins + losses,
        avgDur: 30 + Math.floor(Math.random() * 120),
        blkClosed: blkC, blkPnl,
        bal: 500 + (13 - d) * 0.9,
        eq: 498 + (13 - d) * 0.85,
        peak: 500 + (13 - d) * 0.95,
        grossWin: gWin, grossLoss: gLoss
      });
    }
  }
  return daily;
}
